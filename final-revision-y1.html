<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Grammar Quest: Revisione Totale</title>
    <style>
        body { font-family: sans-serif; background: #0a1628; color: white; padding: 20px; }
        .screen { display: none; }
        .active { display: block; }
        .btn { padding: 15px; background: #00ff88; border: none; cursor: pointer; width: 100%; font-weight: bold; margin: 5px 0; border-radius: 5px; }
        input { padding: 10px; width: 100%; margin: 10px 0; }
    </style>
</head>
<body>

<div id="screen-menu" class="screen active">
    <h2>REVISIONE GRAMMATICA (105 Domande)</h2>
    <input type="text" id="save-code" placeholder="Incolla qui il tuo codice FRY1...">
    <button class="btn" onclick="loadSave()">CARICA PROGRESSI</button>
    <div id="levels-container"></div>
</div>

<div id="screen-game" class="screen">
    <h3 id="lvl-name"></h3>
    <p id="question-text" style="font-size: 1.2em;"></p>
    <input type="text" id="answer-input" placeholder="Scrivi qui la risposta...">
    <button class="btn" onclick="checkAnswer()">CONTROLLA RISPOSTA</button>
</div>

<script>
const levels = [
    {name: "Sintassi", tasks: [{q:"My brother [take] the dog for a walk... he [do] the washing-up.", a:"takes, is doing"}, {q:"We must help her put [a new dictionary and a textbook] back.", a:"put them back on the shelf"}, {q:"Riordina: always / late / for / the / lesson / are / they.", a:"They are always late for the lesson."}, {q:"I [go] to school by bus every day.", a:"go"}, {q:"Look! It [rain] right now.", a:"is raining"}, {q:"Negativa: He plays football.", a:"He doesn't play football."}, {q:"Domanda: They are studying.", a:"Are they studying?"}, {q:"She [not / like] apples.", a:"doesn't like"}, {q:"We [watch] a movie tonight.", a:"are watching"}, {q:"Riordina: often / she / to / go / does / the / gym / ?", a:"Does she often go to the gym?"}, {q:"They [have] breakfast at 8:00.", a:"have"}, {q:"The baby [cry] now.", a:"is crying"}, {q:"Negativa: You are listening.", a:"You aren't listening."}, {q:"Riordina: never / I / late / am / school / for.", a:"I am never late for school."}, {q:"He [usually / eat] cereal.", a:"usually eats"}]},
    {name: "Quantifiers", tasks: [{q:"We don't have ___ money.", a:"enough"}, {q:"You put ___ salt in the soup.", a:"too much"}, {q:"There are ___ people here.", a:"many"}, {q:"We have ___ milk.", a:"a little"}, {q:"I have ___ friends.", a:"a few"}, {q:"The shirt isn't big ___.", a:"enough"}, {q:"How ___ water?", a:"much"}, {q:"How ___ books?", a:"many"}, {q:"I have ___ homework.", a:"a lot of"}, {q:"We need ___ sugar.", a:"some"}, {q:"I don't have ___ money.", a:"any"}, {q:"There is ___ sugar in my tea!", a:"too much"}, {q:"Is this table big ___ for 4 people?", a:"enough"}, {q:"He has ___ talent.", a:"a lot of"}, {q:"I haven't got ___ time.", a:"any"}]},
    {name: "Future & State", tasks: [{q:"I [think] this is right.", a:"think"}, {q:"She [listen] to music now.", a:"is listening"}, {q:"The train [leave] at 9:00.", a:"leaves"}, {q:"I [meet] them at 5:00.", a:"am meeting"}, {q:"I [understand] you.", a:"understand"}, {q:"We [fly] to Rome tomorrow.", a:"are flying"}, {q:"He [seem] tired.", a:"seems"}, {q:"The lesson [start] at 8:30.", a:"starts"}, {q:"I [have] a car.", a:"have"}, {q:"You [look] great!", a:"look"}, {q:"They [get] married on Saturday.", a:"are getting"}, {q:"This pizza [taste] good.", a:"tastes"}, {q:"I [believe] you.", a:"believe"}, {q:"The shop [close] at 7:00.", a:"closes"}, {q:"We [not / know] the answer.", a:"don't know"}]},
    {name: "Past Simple", tasks: [{q:"I [be] at home yesterday.", a:"was"}, {q:"They [go] to the park.", a:"went"}, {q:"Negativa: I saw him.", a:"I didn't see him."}, {q:"Domanda: You liked it.", a:"Did you like it?"}, {q:"She [not / be] here.", a:"wasn't"}, {q:"We [play] football.", a:"played"}, {q:"He [study] hard.", a:"studied"}, {q:"They [be] happy.", a:"were"}, {q:"Negativa: We ate pizza.", a:"We didn't eat pizza."}, {q:"Domanda: He finished work.", a:"Did he finish work?"}, {q:"I [have] a cat.", a:"had"}, {q:"It [rain] yesterday.", a:"rained"}, {q:"Negativa: They were tired.", a:"They weren't tired."}, {q:"Domanda: She called you.", a:"Did she call you?"}, {q:"We [buy] a house.", a:"bought"}]},
    {name: "Irregulars", tasks: [{q:"Past di 'take':", a:"took"}, {q:"Past di 'run':", a:"ran"}, {q:"Past di 'buy':", a:"bought"}, {q:"Past di 'bring':", a:"brought"}, {q:"Past di 'see':", a:"saw"}, {q:"Past di 'eat':", a:"ate"}, {q:"Past di 'drink':", a:"drank"}, {q:"Past di 'find':", a:"found"}, {q:"Past di 'go':", a:"went"}, {q:"Past di 'have':", a:"had"}, {q:"Past di 'make':", a:"made"}, {q:"Past di 'say':", a:"said"}, {q:"Past di 'speak':", a:"spoke"}, {q:"Past di 'write':", a:"wrote"}, {q:"Past di 'win':", a:"won"}]},
    {name: "Relative Clauses", tasks: [{q:"Unisci: The man is my teacher. He lives next door.", a:"The man who lives next door is my teacher."}, {q:"Unisci: The book is new. I bought it yesterday.", a:"The book which I bought yesterday is new."}, {q:"This is the house ___ I live in.", a:"where"}, {q:"She is the girl ___ sings well.", a:"who"}, {q:"The car ___ broke down is red.", a:"which"}, {q:"Unisci: I like the pizza. You made it.", a:"I like the pizza which you made."}, {q:"The man ___ wife is a doctor.", a:"whose"}, {q:"The day ___ we met was Sunday.", a:"when"}, {q:"Unisci: The dog is cute. It has big eyes.", a:"The dog which has big eyes is cute."}, {q:"The boy ___ brother is my friend.", a:"whose"}, {q:"The shop ___ I work is closed.", a:"where"}, {q:"The story ___ he told was sad.", a:"which"}, {q:"The woman ___ helped me is kind.", a:"who"}, {q:"Unisci: The bag is old. I use it for school.", a:"The bag which I use for school is old."}, {q:"The time ___ I get up is 7.", a:"when"}]},
    {name: "Synthesis", tasks: [{q:"Correggi: I am wanting a sandwich.", a:"I want a sandwich."}, {q:"Correggi: I have many bread.", a:"I have much bread."}, {q:"Correggi: She is always busy.", a:"She is always busy."}, {q:"Correggi: The homeworks are easy.", a:"The homework is easy."}, {q:"Correggi: He is more tall than me.", a:"He is taller than me."}, {q:"Correggi: I have go to school.", a:"I have to go to school."}, {q:"Correggi: She like reading.", a:"She likes reading."}, {q:"Correggi: They was here.", a:"They were here."}, {q:"Correggi: I didn't saw him.", a:"I didn't see him."}, {q:"Correggi: This is the house who I live.", a:"This is the house where I live."}, {q:"Correggi: How many water?", a:"How much water?"}, {q:"Correggi: I'm not enough tall.", a:"I'm not tall enough."}, {q:"Correggi: She go to gym.", a:"She goes to the gym."}, {q:"Correggi: We are meet at 5.", a:"We are meeting at 5."}, {q:"Correggi: It is the book who I read.", a:"It is the book which I read."}]}
];

let state = { progress: Array(7).fill(0), currentLvl: 0, taskIdx: 0 };

function renderMenu() {
    document.getElementById('levels-container').innerHTML = levels.map((l, i) => 
        `<button class="btn" onclick="startLvl(${i})">Livello ${i+1}: ${l.name} (${state.progress[i]}/15)</button>`
    ).join('');
}

function startLvl(i) {
    state.currentLvl = i; state.taskIdx = state.progress[i];
    document.getElementById('lvl-name').innerText = levels[i].name;
    document.getElementById('question-text').innerText = levels[i].tasks[state.taskIdx].q;
    document.getElementById('screen-menu').classList.remove('active');
    document.getElementById('screen-game').classList.add('active');
}

function checkAnswer() {
    let input = document.getElementById('answer-input').value.trim();
    let correct = levels[state.currentLvl].tasks[state.taskIdx].a;
    if(input.toLowerCase() === correct.toLowerCase()) {
        alert("CORRETTO!");
        state.progress[state.currentLvl]++;
        state.taskIdx++;
        if(state.taskIdx < 15) {
            document.getElementById('question-text').innerText = levels[state.currentLvl].tasks[state.taskIdx].q;
            document.getElementById('answer-input').value = "";
        } else {
            alert("LIVELLO FINITO! Codice: FRY1." + btoa(JSON.stringify(state)));
            location.reload();
        }
    } else {
        alert("ERRORE. La risposta era: " + correct);
        state.taskIdx++;
        if(state.taskIdx < 15) {
            document.getElementById('question-text').innerText = levels[state.currentLvl].tasks[state.taskIdx].q;
            document.getElementById('answer-input').value = "";
        } else {
            alert("LIVELLO FINITO! Codice: FRY1." + btoa(JSON.stringify(state)));
            location.reload();
        }
    }
}

function loadSave() {
    let code = document.getElementById('save-code').value;
    if(code.startsWith("FRY1.")) {
        state = JSON.parse(atob(code.split('.')[1]));
        renderMenu();
    }
}

renderMenu();
</script>
</body>
</html>
