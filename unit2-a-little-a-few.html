<script>
document.querySelectorAll('[data-tw]').forEach(el=>el.textContent='');

const TOTAL=5;let cur=0,busy=false;
const dotsEl=document.getElementById('dots');
for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='dot'+(i===0?' active':'');dotsEl.appendChild(d);}

function tw(el,text,speed){return new Promise(resolve=>{el.textContent='';const c=document.createElement('span');c.className='cursor';el.appendChild(c);const plain=text.replace(/❮|❯/g,'');let i=0;function tick(){if(i>=plain.length){c.remove();resolve();return;}c.insertAdjacentText('beforebegin',plain[i++]);setTimeout(tick,speed);}tick();});}
function twHL(el,text,speed){return new Promise(resolve=>{const plain=text.replace(/❮|❯/g,'');el.textContent='';const c=document.createElement('span');c.className='cursor';el.appendChild(c);let i=0;function tick(){if(i>=plain.length){c.remove();el.innerHTML=text.replace(/❮([^❯]+)❯/g,'<em class="hl">$1</em>');resolve();return;}c.insertAdjacentText('beforebegin',plain[i++]);setTimeout(tick,speed);}tick();});}

function fi(el){if(el){el.style.transition='opacity 0.4s';setTimeout(()=>el.style.opacity='1',80);}}
function showWarn(el){if(el){el.style.transition='opacity 0.5s';setTimeout(()=>el.style.opacity='1',50);}}

function resetSlide(slide){
  slide.querySelectorAll('[data-tw]').forEach(el=>el.textContent='');
  slide.querySelectorAll('.use-it,.con-it,.err-it,.err-note,.cu-it,.warn').forEach(el=>{
    el.style.transition='none';
    el.style.opacity='0';
  });
}

async function animateSlide(idx){
  const slide=document.getElementById('s'+idx);
  resetSlide(slide);
  const title=slide.querySelector('.slide-title');
  if(title){
    title.style.transition='none';
    title.style.opacity='0';
    setTimeout(()=>{title.style.transition='opacity 0.4s';title.style.opacity='1';},100);
  }
  await new Promise(r=>setTimeout(r,400));
  if(idx===0){
    for(const cell of slide.querySelectorAll('.cu-cell[data-tw]')){await twHL(cell,cell.dataset.tw,38);await new Promise(r=>setTimeout(r,80));}
    for(const ex of slide.querySelectorAll('.cu-ex[data-tw]')){
      await twHL(ex,ex.dataset.tw,42);fi(ex.nextElementSibling);
      await new Promise(r=>setTimeout(r,150));
    }
    showWarn(slide.querySelector('.warn'));
  } else if(idx===1||idx===2){
    for(const row of slide.querySelectorAll('.use-row')){
      const ex=row.querySelector('[data-tw]'),it=row.querySelector('.use-it');
      if(ex)await twHL(ex,ex.dataset.tw,42);fi(it);await new Promise(r=>setTimeout(r,200));
    }
    showWarn(slide.querySelector('.warn'));
  } else if(idx===3){
    for(const row of slide.querySelectorAll('.con-row')){
      const pos=row.querySelector('.con-pos .con-ex'),neg=row.querySelector('.con-neg .con-ex'),it=row.querySelector('.con-it');
      if(pos)await twHL(pos,pos.dataset.tw,42);await new Promise(r=>setTimeout(r,120));
      if(neg)await twHL(neg,neg.dataset.tw,42);fi(it);await new Promise(r=>setTimeout(r,240));
    }
    showWarn(slide.querySelector('.warn'));
  } else if(idx===4){
    for(const pair of slide.querySelectorAll('.err-pair')){
      const wrong=pair.querySelector('.err-wrong'),ok=pair.querySelector('.err-ok'),it=pair.querySelector('.err-it'),note=pair.querySelector('.err-note');
      if(wrong)await tw(wrong,wrong.dataset.tw,42);await new Promise(r=>setTimeout(r,100));
      if(ok)await tw(ok,ok.dataset.tw,42);
      fi(it);
      if(note){note.style.transition='opacity 0.4s';setTimeout(()=>note.style.opacity='1',220);}
      await new Promise(r=>setTimeout(r,280));
    }
  }
}

function go(dir){
  if(busy)return;const prev=cur;cur=Math.max(0,Math.min(TOTAL-1,cur+dir));if(cur===prev)return;busy=true;
  const oldSlide=document.getElementById('s'+prev);const newSlide=document.getElementById('s'+cur);
  oldSlide.style.transition='opacity 0.25s ease';oldSlide.style.opacity='0';
  setTimeout(()=>{
    oldSlide.style.cssText='';oldSlide.classList.remove('active');
    newSlide.style.opacity='0';newSlide.classList.add('active');
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      newSlide.style.transition='opacity 0.25s ease';newSlide.style.opacity='1';
      setTimeout(()=>{newSlide.style.cssText='';busy=false;},260);
    }));
    animateSlide(cur);
    dotsEl.children[prev].classList.remove('active');dotsEl.children[cur].classList.add('active');
    document.getElementById('prog').textContent=(cur+1)+' / '+TOTAL;
    document.getElementById('prevBtn').disabled=cur===0;document.getElementById('nextBtn').disabled=cur===TOTAL-1;
  },260);
}
let tx=0;const sl=document.querySelector('.slides');
sl.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
sl.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)go(dx<0?1:-1);},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1);});
animateSlide(0);
</script>
