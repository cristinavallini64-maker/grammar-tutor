<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Poppins',sans-serif;background:#fff;color:#111;display:flex;flex-direction:column;height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:4px solid #009933;flex-shrink:0;}
.title{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(0.75rem,2.6vw,1.3rem);letter-spacing:2px;color:#009933;}

.dot{width:11px;height:11px;border-radius:50%;background:#e0e0e0;transition:background 0.3s;}

.slides{flex:1;position:relative;overflow:hidden;}

.slide.active{visibility:visible;opacity:1;}
.slide-title{font-family:'Orbitron',monospace;font-weight:700;font-size:clamp(0.68rem,2.2vw,0.9rem);letter-spacing:2px;color:#009933;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #eee;flex-shrink:0;opacity:0;transition:opacity 0.4s;}
.slide-title.show{opacity:1;}
/* Elementi nascosti all'avvio */
.cmp-col, .use-row, .err-pair, .warn, .cmp-it, .use-it, .err-it { opacity: 0; transition: opacity 0.5s; }
.cmp-table{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.cmp-col{border-radius:10px;overflow:hidden;border:2px solid #eee;}
.cmp-head{font-family:'Orbitron',monospace;font-size:clamp(0.6rem,1.8vw,0.8rem);letter-spacing:1.5px;font-weight:700;padding:9px 8px;text-align:center;color:#fff;background:#009933;}
.cmp-body{padding:10px 12px;}
.cmp-form{font-family:'Orbitron',monospace;font-size:clamp(0.6rem,1.75vw,0.75rem);color:#111;font-weight:700;background:#fafafa;padding:6px 8px;border-radius:5px;margin-bottom:8px;}
.cmp-ex{font-size:clamp(0.74rem,2.2vw,0.9rem);font-weight:600;color:#111;margin-bottom:5px;}
.cmp-it{font-size:clamp(0.62rem,1.8vw,0.75rem);color:#999;font-style:italic;line-height:1.3;}
.use-row{padding:8px 0;border-bottom:1px solid #f0f0f0;}
.use-ex{font-size:clamp(0.84rem,2.7vw,1rem);font-weight:600;display:block;}
.use-it{font-size:clamp(0.64rem,1.85vw,0.78rem);color:#999;font-style:italic;display:block;margin-top:3px;}
.use-tag{font-family:'Orbitron',monospace;font-size:clamp(0.5rem,1.4vw,0.62rem);padding:2px 7px;border-radius:4px;margin-right:7px;color:#fff;background:#009933;}
.err-pair{padding:6px 0;border-bottom:1px solid #f0f0f0;}

.err-it{font-size:clamp(0.65rem,1.9vw,0.78rem);color:#999;font-style:italic;}
.warn{background:#f0fff4;border-left:5px solid #009933;padding:9px 14px;font-size:clamp(0.72rem,2.2vw,0.88rem);font-weight:600;margin-top:8px;}
.hl{font-weight:900;color:#009933;font-style:normal;}
.cursor{display:inline-block;width:2px;height:1em;background:#009933;vertical-align:middle;margin-left:1px;animation:blink 0.6s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
.btn-nav{font-family:'Orbitron',monospace;font-weight:700;padding:10px 24px;border-radius:8px;border:2px solid #009933;background:#fff;color:#009933;cursor:pointer;}

<body>
<div class="topbar"><div class="title">🟢 UNIT 10 · MAKE + OBJECT</div><div class="prog" id="prog">1 / 5</div></div>
<div class="dots" id="dots"></div>

      <div class="cmp-col"><div class="cmp-head">MAKE + OBJ + ADJ</div><div class="cmp-body"><div class="cmp-form" data-tw="S + MAKE + OBJ + ADJ"></div><div class="cmp-ex" data-tw="You ❮make me❯ happy."></div><div class="cmp-it">Tu mi rendi felice.</div></div></div>
      <div class="cmp-col"><div class="cmp-head">MAKE + OBJ + VERB</div><div class="cmp-body"><div class="cmp-form" data-tw="S + MAKE + OBJ + V(base)"></div><div class="cmp-ex" data-tw="She ❮made us❯ wait."></div><div class="cmp-it">Lei ci ha fatto aspettare.</div></div></div>

<div class="nav" style="display:flex;justify-content:center;gap:20px;padding:10px;">
  <button class="btn-nav" id="prevBtn" onclick="go(-1)" disabled>◀ INDIETRO</button>
  <button class="btn-nav" id="nextBtn" onclick="go(1)">AVANTI ▶</button>
</div>
<script>
// Logica "Present Simple vs Continuous" (Scrittura sequenziale rigida)
async function tw(el, text, speed=80) {
    el.textContent = '';
    const cursor = document.createElement('span'); cursor.className = 'cursor';
    el.appendChild(cursor);
    const plain = text.replace(/❮|❯/g, '');
    for(let i=0; i<plain.length; i++){
        cursor.insertAdjacentText('beforebegin', plain[i]);
        await new Promise(r=>setTimeout(r, speed));
    }
    cursor.remove();
    // Se c'è un tag di formattazione (❮...❯)
    if(text.includes('❮')) {
        el.innerHTML = text.replace(/❮([^❯]+)❯/g, '<em class="hl">$1</em>');
    }
}

async function animateSlide(idx) {
    const s = document.getElementById('s'+idx);
    s.querySelector('.slide-title').classList.add('show');
    await new Promise(r=>setTimeout(r, 500));
    
    // Seleziona tutti gli elementi che devono apparire in ordine
    const elements = s.querySelectorAll('.cmp-col, .use-row, .err-pair, .warn');
    for(let el of elements) {
        el.style.opacity = '1';
        const textElements = el.querySelectorAll('[data-tw]');
        for(let t of textElements) {
            await tw(t, t.dataset.tw);
        }
        const desc = el.querySelector('.cmp-it, .use-it, .err-it');
        if(desc) desc.style.opacity = '1';
    }
}

function go(d){
    // ... stessa logica di transizione (senza mostrare nulla prima della fine della transizione)
    animateSlide(cur);
}
animateSlide(0);
</script>
