<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 10 · Connections – Intro</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    /* Reset e stili strutturali speculari ai tuoi esempi */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #0d0d0d;
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #fff;
      padding: 20px;
    }

    /* Pulsante Chiudi in alto a sinistra, non invasivo */
    .close-tab {
      align-self: flex-start;
      color: #777;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 40px;
      transition: color 0.2s;
    }
    .close-tab:hover {
      color: #fff;
    }

    /* Contenitore centrale a larghezza controllata con bordo verde */
    .container {
      max-width: 550px;
      width: 100%;
      margin: auto;
      background-color: #141414;
      border: 3px solid #00CC44;
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 204, 68, 0.1);
    }

    /* Intestazione */
    .unit-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      color: #00CC44;
      letter-spacing: 4px;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .main-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      letter-spacing: 3px;
      line-height: 1;
      color: #fff;
      margin-bottom: 5px;
    }
    .subtitle {
      font-size: 1.3rem;
      font-weight: 800;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    /* Linea divisoria orizzontale */
    hr {
      border: 0;
      height: 1px;
      background: #333;
      margin-bottom: 25px;
    }

    /* Box di digitazione ad altezza fissa per preservare il layout */
    .text-box {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
    }
    .typewriter-text {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #dddddd;
      font-weight: 400;
    }

    /* Evidenziazione interna al testo animato */
    .hl {
      color: #00CC44;
      font-weight: 700;
    }

    /* Cursore del testo */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background-color: #00CC44;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 0.6s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Bottone d'ingresso che appare solo alla fine della digitazione */
    .action-btn {
      display: inline-block;
      background-color: #00CC44;
      color: #000;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 28px;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
      opacity: 0;
      visibility: hidden;
    }
    .action-btn.visible {
      opacity: 1;
      visibility: visible;
    }
    .action-btn:hover {
      background-color: #00ff55;
      transform: scale(1.03);
    }
  </style>
</head>
<body>

  <a href="#" class="close-tab" onclick="window.close(); return false;">✕ Chiudi questa scheda</a>

  <div class="container">
    <div class="unit-label">DIGITAL HUB</div>
    <h1 class="main-title">UNIT 10</h1>
    <div class="subtitle">Connections</div>
    
    <hr>

    <div class="text-box">
      <p class="typewriter-text" id="targetText" data-src="Benvenuto nel modulo di ripasso dedicato alle ❮connessioni grammaticali❯ e alle strutture verbali fondamentali della Unit 10."></p>
    </div>

    <a href="unit10_menu.html" class="action-btn" id="startBtn">
      ENTRA NEL RIPASSO ➔
    </a>
  </div>

  <script>
    const textContainer = document.getElementById('targetText');
    const actionButton = document.getElementById('startBtn');
    const sourceString = textContainer.getAttribute('data-src');

    // Funzione di digitazione corretta a 70ms (rallentata su tua richiesta)
    function runTypewriter(element, text, delay = 70, callback) {
      element.innerHTML = '';
      let index = 0;
      let currentHTML = '';

      function renderNextChar() {
        if (index < text.length) {
          let char = text[index];
          if (char === '❮') {
            currentHTML += '<span class="hl">';
            index++;
          } else if (char === '❯') {
            currentHTML += '</span>';
            index++;
          } else {
            currentHTML += text[index];
            index++;
          }
          element.innerHTML = currentHTML + '<span class="cursor"></span>';
          setTimeout(renderNextChar, delay);
        } else {
          element.innerHTML = currentHTML; // Rimuove il cursore lampeggiante alla fine
          if (callback) callback();
        }
      }
      renderNextChar();
    }

    // Esecuzione controllata all'avvio
    window.onload = () => {
      setTimeout(() => {
        runTypewriter(textContainer, sourceString, 70, () => {
          actionButton.classList.add('visible');
        });
      }, 300);
    };
  </script>

</body>
</html>
